<script>
// ════════════════════════════════════════════════════════
//  MATH EXPRESSION TREE
// ════════════════════════════════════════════════════════
// Each node: { type, children, ... }
// Types: seq (sequence), frac (a/b), sqrt, abs, sup (^)

function makeSeq(children = []) { return { type:'seq', children }; }
function makeFrac() { return { type:'frac', num: makeSeq(), den: makeSeq() }; }
function makeSqrt() { return { type:'sqrt', inner: makeSeq() }; }
function makeAbs()  { return { type:'abs',  inner: makeSeq() }; }
function makeSup()  { return { type:'sup',  base: null, exp: makeSeq() }; } // base filled on insert

// ── State ──
// cursor is { parent: seqNode, index: number }
// We keep a path stack for nested navigation

let root = makeSeq();
let cursorParent = root;   // always a seq
let cursorIndex  = 0;      // position within parent.children

// ── Render ──
function renderNode(node) {
  if (typeof node === 'string') {
    const s = document.createElement('span');
    s.textContent = node;
    return s;
  }
  if (node.type === 'seq') {
    const wrap = document.createElement('span');
    wrap.dataset.seq = '1';
    node.children.forEach(c => wrap.appendChild(renderNode(c)));
    return wrap;
  }
  if (node.type === 'frac') {
    const wrap = document.createElement('span');
    wrap.className = 'm-frac';
    const num = document.createElement('span');
    num.className = 'm-frac-num';
    num.appendChild(renderNode(node.num));
    const den = document.createElement('span');
    den.className = 'm-frac-den';
    den.appendChild(renderNode(node.den));
    wrap.appendChild(num);
    wrap.appendChild(den);
    return wrap;
  }
  if (node.type === 'sqrt') {
    const wrap = document.createElement('span');
    wrap.className = 'm-sqrt';
    const sign = document.createElement('span');
    sign.className = 'm-sqrt-sign';
    sign.textContent = '√';
    const inner = document.createElement('span');
    inner.className = 'm-sqrt-inner';
    inner.appendChild(renderNode(node.inner));
    wrap.appendChild(sign);
    wrap.appendChild(inner);
    return wrap;
  }
  if (node.type === 'abs') {
    const wrap = document.createElement('span');
    wrap.className = 'm-abs';
    const b1 = document.createElement('span');
    b1.className = 'm-abs-bar'; b1.textContent = '|';
    const inner = document.createElement('span');
    inner.className = 'm-abs-inner';
    inner.appendChild(renderNode(node.inner));
    const b2 = document.createElement('span');
    b2.className = 'm-abs-bar'; b2.textContent = '|';
    wrap.appendChild(b1); wrap.appendChild(inner); wrap.appendChild(b2);
    return wrap;
  }
  if (node.type === 'sup') {
    const wrap = document.createElement('span');
    wrap.className = 'm-sup';
    if (node.base) wrap.appendChild(renderNode(node.base));
    const exp = document.createElement('span');
    exp.className = 'm-sup-exp';
    exp.appendChild(renderNode(node.exp));
    wrap.appendChild(exp);
    return wrap;
  }
  return document.createTextNode('?');
}

function redraw() {
  const display = document.getElementById('math-display');
  display.innerHTML = '';

  // We need to inject the cursor into the rendered tree.
  // Strategy: render with cursor placeholder, then replace.
  const cursorEl = document.createElement('span');
  cursorEl.className = 'cursor';

  // inject cursor token into cursorParent at cursorIndex
  const placeholder = { type: '__cursor__' };
  cursorParent.children.splice(cursorIndex, 0, placeholder);

  function renderWithCursor(node) {
    if (node === placeholder) return cursorEl;
    if (typeof node === 'string') {
      const s = document.createElement('span');
      s.textContent = node;
      return s;
    }
    if (node.type === '__cursor__') return cursorEl;
    if (node.type === 'seq') {
      const wrap = document.createElement('span');
      node.children.forEach(c => wrap.appendChild(renderWithCursor(c)));
      return wrap;
    }
    if (node.type === 'frac') {
      const wrap = document.createElement('span');
      wrap.className = 'm-frac';
      const num = document.createElement('span');
      num.className = 'm-frac-num';
      num.appendChild(renderWithCursor(node.num));
      const den = document.createElement('span');
      den.className = 'm-frac-den';
      den.appendChild(renderWithCursor(node.den));
      wrap.appendChild(num); wrap.appendChild(den);
      return wrap;
    }
    if (node.type === 'sqrt') {
      const wrap = document.createElement('span');
      wrap.className = 'm-sqrt';
      const sign = document.createElement('span');
      sign.className = 'm-sqrt-sign'; sign.textContent = '√';
      const inner = document.createElement('span');
      inner.className = 'm-sqrt-inner';
      inner.appendChild(renderWithCursor(node.inner));
      wrap.appendChild(sign); wrap.appendChild(inner);
      return wrap;
    }
    if (node.type === 'abs') {
      const wrap = document.createElement('span');
      wrap.className = 'm-abs';
      const b1 = document.createElement('span');
      b1.className = 'm-abs-bar'; b1.textContent = '|';
      const inner = document.createElement('span');
      inner.className = 'm-abs-inner';
      inner.appendChild(renderWithCursor(node.inner));
      const b2 = document.createElement('span');
      b2.className = 'm-abs-bar'; b2.textContent = '|';
      wrap.appendChild(b1); wrap.appendChild(inner); wrap.appendChild(b2);
      return wrap;
    }
    if (node.type === 'sup') {
      const wrap = document.createElement('span');
      wrap.className = 'm-sup';
      if (node.base) wrap.appendChild(renderWithCursor(node.base));
      const exp = document.createElement('span');
      exp.className = 'm-sup-exp';
      exp.appendChild(renderWithCursor(node.exp));
      wrap.appendChild(exp);
      return wrap;
    }
    return document.createTextNode('?');
  }

  display.appendChild(renderWithCursor(root));
  // remove placeholder
  cursorParent.children.splice(cursorParent.children.indexOf(placeholder), 1);
}

// ── Convert tree to plain text for API ──
function treeToText(node) {
  if (typeof node === 'string') return node;
  if (node.type === 'seq') return node.children.map(treeToText).join('');
  if (node.type === 'frac') return `(${treeToText(node.num)})/(${treeToText(node.den)})`;
  if (node.type === 'sqrt') return `sqrt(${treeToText(node.inner)})`;
  if (node.type === 'abs')  return `abs(${treeToText(node.inner)})`;
  if (node.type === 'sup')  return `(${node.base ? treeToText(node.base) : ''})^(${treeToText(node.exp)})`;
  return '';
}

// ── Navigation stack ──
// Each entry: { seq, index, role }  (role = 'num','den','inner','exp','root')
let navStack = [{ seq: root, index: 0, role: 'root' }];
// cursorParent and cursorIndex are the current level

function pushLevel(seq, startIndex, role) {
  navStack.push({ seq: cursorParent, index: cursorIndex, role });
  cursorParent = seq;
  cursorIndex  = startIndex;
}

function popLevel() {
  if (navStack.length <= 1) return false;
  const prev = navStack.pop();
  cursorParent = prev.seq;
  cursorIndex  = prev.index;
  return true;
}

// ── Insert text ──
function insertText(str) {
  for (const ch of str) {
    cursorParent.children.splice(cursorIndex, 0, ch);
    cursorIndex++;
  }
  redraw();
}

// ── Insert structure ──
function insertStruct(type) {
  if (type === 'frac') {
    const node = makeFrac();
    cursorParent.children.splice(cursorIndex, 0, node);
    // cursor goes into numerator
    pushLevel(node.num, 0, 'frac-num');
    cursorIndex = 0;
  } else if (type === 'sqrt') {
    const node = makeSqrt();
    cursorParent.children.splice(cursorIndex, 0, node);
    pushLevel(node.inner, 0, 'sqrt-inner');
  } else if (type === 'abs') {
    const node = makeAbs();
    cursorParent.children.splice(cursorIndex, 0, node);
    pushLevel(node.inner, 0, 'abs-inner');
  } else if (type === 'sup') {
    // take previous token as base
    const base = cursorIndex > 0 ? cursorParent.children.splice(cursorIndex-1, 1)[0] : null;
    if (base) cursorIndex--;
    const node = makeSup();
    node.base = base;
    cursorParent.children.splice(cursorIndex, 0, node);
    cursorIndex++; // move past the sup node in parent
    // actually cursor goes INTO exp
    cursorIndex--; // undo
    pushLevel(node.exp, 0, 'sup-exp');
  }
  redraw();
}

// ── Navigation ──
function navLeft() {
  if (cursorIndex > 0) {
    cursorIndex--;
    // optionally enter structure from the right
  }
  redraw();
}

function navRight() {
  if (cursorIndex < cursorParent.children.length) {
    cursorIndex++;
  }
  redraw();
}

// up = exit current level (go to parent)
function navUp() {
  if (!popLevel()) return;
  // after exiting, advance past the node we were in
  cursorIndex++;
  if (cursorIndex > cursorParent.children.length) cursorIndex = cursorParent.children.length;
  redraw();
}

// down = enter next structure's first child (or current node if seq)
function navDown() {
  const node = cursorParent.children[cursorIndex];
  if (!node || typeof node === 'string') return;
  if (node.type === 'frac') { pushLevel(node.num, 0, 'frac-num'); }
  else if (node.type === 'sqrt') { pushLevel(node.inner, 0, 'sqrt'); }
  else if (node.type === 'abs')  { pushLevel(node.inner, 0, 'abs'); }
  else if (node.type === 'sup')  { pushLevel(node.exp, 0, 'sup'); }
  redraw();
}

// special down for frac: if in num, go to den
function navDownFrac() {
  const stackTop = navStack[navStack.length - 1];
  // find the frac node in parent
  const parentSeq = stackTop.seq;
  const parentIdx = stackTop.index;
  const fracNode  = parentSeq.children[parentIdx];
  if (fracNode && fracNode.type === 'frac' && cursorParent === fracNode.num) {
    pushLevel(fracNode.den, 0, 'frac-den');
    redraw();
    return true;
  }
  return false;
}

// ── Backspace ──
function doDelete() {
  if (cursorIndex > 0) {
    const removed = cursorParent.children.splice(cursorIndex-1, 1)[0];
    cursorIndex--;
  } else {
    popLevel();
  }
  redraw();
}

// ── Clear ──
function doClear() {
  root = makeSeq();
  cursorParent = root;
  cursorIndex  = 0;
  navStack = [{ seq: root, index: 0, role: 'root' }];
  redraw();
}

// ── Keyboard input ──
document.getElementById('math-display').addEventListener('keydown', function(e) {
  e.preventDefault();
  if (e.key === 'ArrowLeft')  { navLeft(); return; }
  if (e.key === 'ArrowRight') { navRight(); return; }
  if (e.key === 'ArrowUp')    { navUp(); return; }
  if (e.key === 'ArrowDown')  {
    if (!navDownFrac()) navDown();
    return;
  }
  if (e.key === 'Backspace')  { doDelete(); return; }
  if (e.key === 'Escape')     { navUp(); return; }
  if (e.key.length === 1)     { insertText(e.key); return; }
});

// ── Button clicks ──
document.querySelectorAll('.kb-btn[data-ins]').forEach(btn => {
  btn.addEventListener('mousedown', e => {
    e.preventDefault();
    document.getElementById('math-display').focus();
    insertText(btn.dataset.ins);
  });
});

document.querySelectorAll('.kb-btn[data-struct]').forEach(btn => {
  btn.addEventListener('mousedown', e => {
    e.preventDefault();
    document.getElementById('math-display').focus();
    insertStruct(btn.dataset.struct);
  });
});

document.querySelectorAll('.kb-btn[data-nav]').forEach(btn => {
  btn.addEventListener('mousedown', e => {
    e.preventDefault();
    document.getElementById('math-display').focus();
    const nav = btn.dataset.nav;
    if (nav === 'left')  navLeft();
    if (nav === 'right') navRight();
    if (nav === 'up')    navUp();
    if (nav === 'down')  { if (!navDownFrac()) navDown(); }
    if (nav === 'del')   doDelete();
    if (nav === 'clear') doClear();
  });
});

// focus editor on wrap click
document.getElementById('editor-wrap').addEventListener('click', () => {
  document.getElementById('math-display').focus();
});

// ── Tends-to buttons ──
let tendoValue = '';
document.querySelectorAll('.tendo-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tendo-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    tendoValue = btn.dataset.val;
    document.getElementById('custom-val').value = '';
    document.getElementById('lim-sub').textContent = `x → ${tendoValue}`;
  });
});
document.getElementById('custom-val').addEventListener('input', function() {
  document.querySelectorAll('.tendo-btn').forEach(b => b.classList.remove('active'));
  tendoValue = this.value;
  document.getElementById('lim-sub').textContent = tendoValue ? `x → ${tendoValue}` : 'x → ?';
});

// ── Initial draw ──
redraw();
document.getElementById('math-display').focus();
class LimitParser {
  constructor(src) {
    // normalizza: togli spazi, converti '−' unicode in '-'
    this.src = src.replace(/\s+/g, '').replace(/−/g, '-');
    this.pos = 0;
  }
  peek()  { return this.src[this.pos] ?? ''; }
  next()  { return this.src[this.pos++]; }
  eat(ch) { if (this.peek() === ch) { this.pos++; return true; } return false; }
  end()   { return this.pos >= this.src.length; }
 
  parse() {
    const n = this.expr();
    if (!this.end()) throw new Error(`carattere inatteso '${this.peek()}' pos ${this.pos}`);
    return n;
  }
 
  expr() {
    let n = this.term();
    while (this.peek() === '+' || this.peek() === '-') {
      const op = this.next();
      n = { op, l: n, r: this.term() };
    }
    return n;
  }
 
  term() {
    let n = this.factor();
    while (this.peek() === '*' || this.peek() === '/') {
      const op = this.next();
      n = { op, l: n, r: this.factor() };
    }
    return n;
  }
 
  factor() {
    let n = this.unary();
    while (this.peek() === '^') {
      this.next();
      n = { op: '^', l: n, r: this.unary() };
    }
    return n;
  }
 
  unary() {
    if (this.peek() === '-') { this.next(); return { op: 'neg', v: this.unary() }; }
    return this.primary();
  }
 
  primary() {
    const ch = this.peek();
 
    // numero
    if (ch >= '0' && ch <= '9') {
      let s = '';
      while (this.peek() >= '0' && this.peek() <= '9' || this.peek() === '.') s += this.next();
      return { op: 'num', v: parseFloat(s) };
    }
 
    // costanti e variabile
    if (ch === 'x') { this.next(); return { op: 'var' }; }
    if (ch === 'π') { this.next(); return { op: 'num', v: Math.PI }; }
    if (ch === '∞') { this.next(); return { op: 'num', v: Infinity }; }
 
    // 'e' come costante (solo se NON seguito da lettera = non è "exp","etc")
    if (ch === 'e' && !/[a-zA-Z]/.test(this.src[this.pos + 1] ?? '')) {
      this.next(); return { op: 'num', v: Math.E };
    }
 
    // funzioni — ordine importante: più lunghe prima
    const FUNCS = ['sqrt', 'asin', 'acos', 'atan', 'abs', 'sin', 'cos', 'tan', 'exp', 'ln', 'log'];
    for (const f of FUNCS) {
      if (this.src.startsWith(f, this.pos)) {
        this.pos += f.length;
        this.eat('(');
        const arg = this.expr();
        this.eat(')');
        return { op: f, v: arg };
      }
    }
 
    // parentesi
    if (ch === '(') {
      this.next();
      const n = this.expr();
      this.eat(')');
      return n;
    }
 
    throw new Error(`token inatteso '${ch}' pos ${this.pos} in "${this.src}"`);
  }
}
 
// ── 2. VALUTATORE ─────────────────────────────────────
function limitEval(node, x) {
  switch (node.op) {
    case 'num':  return node.v;
    case 'var':  return x;
    case 'neg':  return -limitEval(node.v, x);
    case '+':    return limitEval(node.l, x) + limitEval(node.r, x);
    case '-':    return limitEval(node.l, x) - limitEval(node.r, x);
    case '*':    return limitEval(node.l, x) * limitEval(node.r, x);
    case '/': {
      const num = limitEval(node.l, x);
      const den = limitEval(node.r, x);
      // 0/0 → NaN (forma indeterminata, gestita numericamente)
      if (den === 0) return (num === 0 || isNaN(num)) ? NaN : (num > 0 ? Infinity : -Infinity);
      return num / den;
    }
    case '^': {
      const b = limitEval(node.l, x);
      const e = limitEval(node.r, x);
      // 0^0 → NaN (indeterminato, da valutare con sequenza)
      if (b === 0 && e === 0) return NaN;
      // base negativa con esponente non intero → NaN (fuori dominio reale)
      if (b < 0 && !Number.isInteger(e)) return NaN;
      // 0^(negativo) → +∞
      if (b === 0 && e < 0) return Infinity;
      return Math.pow(b, e);
    }
    case 'sqrt': { const v = limitEval(node.v, x); return v < 0 ? NaN : Math.sqrt(v); }
    case 'abs':  return Math.abs(limitEval(node.v, x));
    case 'sin':  return Math.sin(limitEval(node.v, x));
    case 'cos':  return Math.cos(limitEval(node.v, x));
    case 'tan':  return Math.tan(limitEval(node.v, x));
    case 'asin': return Math.asin(limitEval(node.v, x));
    case 'acos': return Math.acos(limitEval(node.v, x));
    case 'atan': return Math.atan(limitEval(node.v, x));
    case 'exp':  return Math.exp(limitEval(node.v, x));
    case 'ln':  { const v = limitEval(node.v, x); return v <= 0 ? (v === 0 ? -Infinity : NaN) : Math.log(v); }
    case 'log': { const v = limitEval(node.v, x); return v <= 0 ? (v === 0 ? -Infinity : NaN) : Math.log10(v); }
    default: return NaN;
  }
}
 
// ── 3. SEQUENZE DI AVVICINAMENTO ──────────────────────
// Genera punti che si avvicinano ad `a` dal lato `side` (+1 = destra, -1 = sinistra).
//
// CHIAVE: per a finito usiamo solo k = 1..7 (da 10^-1 a 10^-7).
// k > 7 produce cancellazione catastrofica per funzioni tipo (1-cos(x)) o (1+x)^(1/x)
// perché la differenza di due quasi-uguali perde tutti i bit significativi.
//
// Per a = ±∞ usiamo valori grandi da 10^1 a 10^14.
function makeApproachSeq(a, side) {
  if (!isFinite(a)) {
    const s = a > 0 ? 1 : -1;
    return Array.from({ length: 14 }, (_, k) => s * Math.pow(10, k + 1));
  }
  return Array.from({ length: 7 }, (_, k) => a + side * Math.pow(10, -(k + 1)));
}
 
// ── 4. CLASSIFICAZIONE SEQUENZA ───────────────────────
// Dato un array di valori f(x_k) determinare il comportamento:
// 'finite'     → converge a un numero
// 'inf'        → diverge a ±∞
// 'oscillates' → oscilla senza convergere
// 'nan'        → troppo pochi valori finiti (fuori dominio)
// 'unclear'    → non determinato
//
// TRUCCO PRINCIPALE: usa una "finestra stabile" — salta i primi punti (transitori lenti)
// e l'ultimo (possibile noise floating-point). Per 7 punti: usa i punti 1..5.
function classifySeq(vals) {
  // separa finiti da infiniti
  const fin    = vals.filter(v => Number.isFinite(v));
  const infPos = vals.filter(v => v === +Infinity).length;
  const infNeg = vals.filter(v => v === -Infinity).length;
  const nanCnt = vals.filter(v => isNaN(v)).length;
 
  // caso: quasi tutto NaN → fuori dominio
  if (nanCnt >= vals.length - 1) return { type: 'nan' };
 
  // caso: molti Infinity espliciti → divergenza
  if (infPos + infNeg >= Math.max(3, vals.length * 0.5)) {
    if (infPos > infNeg) return { type: 'inf', sign: +1 };
    if (infNeg > infPos) return { type: 'inf', sign: -1 };
    return { type: 'oscillates' };
  }
 
  if (fin.length < 3) return { type: 'nan' };
 
  // finestra stabile: salta il primo (transitorio) e l'ultimo (float noise)
  const w = fin.length >= 5 ? fin.slice(1, fin.length - 1) : fin;
  const avg    = w.reduce((s, v) => s + v, 0) / w.length;
  const spread = Math.max(...w.map(v => Math.abs(v - avg)));
  const scale  = 1 + Math.abs(avg);
 
  // ── CONVERGENZA FINITA ──
  // spread relativo < 0.1%
  if (spread < 1e-3 * scale) return { type: 'finite', value: avg };
 
  // ── DIVERGENZA MONOTONA (tipo ln, x^3, ...) ──
  // la sequenza è tutta finita, monotona, e l'ultimo valore è più grande del primo
  const diffs  = fin.slice(1).map((v, i) => v - fin[i]);
  const allUp  = diffs.every(d => d >= -1e-10);
  const allDn  = diffs.every(d => d <= +1e-10);
  const first  = fin[0], last = fin[fin.length - 1];
 
  if (allUp && last > first) {
    // cresce: verso +∞ (ma verifica che non stia convergendo a un finito)
    if (Math.abs(last - first) > 0.1 * (1 + Math.abs(avg))) return { type: 'inf', sign: +1 };
  }
  if (allDn && last < first) {
    if (Math.abs(last - first) > 0.1 * (1 + Math.abs(avg))) return { type: 'inf', sign: -1 };
  }
 
  // ── OSCILLAZIONE ──
  const range = Math.max(...w) - Math.min(...w);
  if (range > 0.5 * (1 + Math.abs(avg)) && !allUp && !allDn) return { type: 'oscillates' };
 
  return { type: 'unclear', last };
}
 
// ── 5. UTILITÀ DI FORMATTAZIONE ───────────────────────
function _gcd(a, b) { return b === 0 ? a : _gcd(b, a % b); }
 
function fmtPoint(a) {
  if (a === +Infinity)            return '+∞';
  if (a === -Infinity)            return '-∞';
  if (Math.abs(a - Math.PI) < 1e-9) return 'π';
  return String(a);
}
 
function fmtNum(v) {
  if (v === +Infinity)  return '+∞';
  if (v === -Infinity)  return '-∞';
  if (isNaN(v))         return 'NaN';
 
  // intero?
  const r = Math.round(v);
  if (Math.abs(v - r) < 1e-5) return String(r);
 
  // frazione p/q con |p|,q ≤ 50?
  for (let q = 2; q <= 50; q++) {
    for (let p = -300; p <= 300; p++) {
      if (p !== 0 && _gcd(Math.abs(p), q) === 1 && Math.abs(v - p / q) < 1e-5) return `${p}/${q}`;
    }
  }
 
  // costanti note
  const CONSTS = [
    [Math.E,       'e'],
    [Math.PI,      'π'],
    [Math.SQRT2,   '√2'],
    [Math.PI / 2,  'π/2'],
    [Math.LOG2E,   'log₂e'],
    [1 / Math.PI,  '1/π'],
  ];
  for (const [c, s] of CONSTS) {
    if (Math.abs(v - c) < 1e-5) return s;
    if (Math.abs(v + c) < 1e-5) return '-' + s;
  }
 
  return parseFloat(v.toPrecision(6)).toString();
}
 
function descSeq(cl) {
  if (cl.type === 'finite')     return `converge a ${fmtNum(cl.value)}`;
  if (cl.type === 'inf')        return `diverge a ${cl.sign > 0 ? '+' : '-'}∞`;
  if (cl.type === 'oscillates') return 'oscilla (nessun limite)';
  if (cl.type === 'nan')        return 'non definita';
  return 'indeterminata';
}
 
// ── 6. MOTORE PRINCIPALE ──────────────────────────────
function computeLimit(exprStr, tendoStr) {
  // --- parse punto di tendenza ---
  let a;
  const t = tendoStr.trim();
  if      (t === '+∞' || t === '∞')  a = +Infinity;
  else if (t === '-∞')               a = -Infinity;
  else if (t === 'π')                a = Math.PI;
  else {
    a = parseFloat(t);
    if (isNaN(a)) return { error: `valore "${t}" non riconosciuto` };
  }
 
  // --- parse funzione ---
  let ast;
  try {
    ast = new LimitParser(exprStr).parse();
  } catch (e) {
    return { error: 'Errore di sintassi: ' + e.message };
  }
 
  const f = x => limitEval(ast, x);
 
  // --- sostituzione diretta ---
  if (isFinite(a)) {
    const d = f(a);
    if (Number.isFinite(d)) {
      return {
        result: fmtNum(d),
        steps: [`Sostituzione diretta x = ${fmtPoint(a)}: f(${fmtPoint(a)}) = ${fmtNum(d)}`]
      };
    }
  }
 
  // --- avvicinamento numerico ---
  const steps = [`x → ${fmtPoint(a)}: sostituzione diretta produce una forma indeterminata o indefinita.`];
 
  const valsR = makeApproachSeq(a, +1).map(f);
  const valsL = makeApproachSeq(a, -1).map(f);
  const clR   = classifySeq(valsR);
  const clL   = classifySeq(valsL);
 
  steps.push(`Limite da destra (x → ${fmtPoint(a)}⁺): ${descSeq(clR)}`);
  if (isFinite(a)) {
    steps.push(`Limite da sinistra (x → ${fmtPoint(a)}⁻): ${descSeq(clL)}`);
  }
 
  // --- x → ±∞: un solo lato ---
  if (!isFinite(a)) {
    if (clR.type === 'finite')     return { result: fmtNum(clR.value), steps };
    if (clR.type === 'inf')        return { result: clR.sign > 0 ? '+∞' : '-∞', steps };
    if (clR.type === 'oscillates') return { result: '∄  (oscilla)', steps };
    return { result: '?', steps: [...steps, 'Convergenza non determinata numericamente.'] };
  }
 
  // --- x → a finito: confronta i due lati ---
 
  // entrambi NaN → fuori dominio
  if (clL.type === 'nan' && clR.type === 'nan') {
    steps.push('La funzione non è definita in nessun intorno del punto.');
    return { result: '∄', steps };
  }
 
  // definita solo da un lato
  if (clL.type === 'nan') {
    steps.push(`Funzione definita solo a destra di ${fmtPoint(a)} (es. radice o logaritmo con argomento negativo a sinistra).`);
    if (clR.type === 'finite') return { result: fmtNum(clR.value), steps };
    if (clR.type === 'inf')    return { result: clR.sign > 0 ? '+∞' : '-∞', steps };
  }
  if (clR.type === 'nan') {
    steps.push(`Funzione definita solo a sinistra di ${fmtPoint(a)}.`);
    if (clL.type === 'finite') return { result: fmtNum(clL.value), steps };
    if (clL.type === 'inf')    return { result: clL.sign > 0 ? '+∞' : '-∞', steps };
  }
 
  // oscillazione
  if (clL.type === 'oscillates' || clR.type === 'oscillates') {
    steps.push('La funzione oscilla in un intorno del punto → il limite non esiste.');
    return { result: '∄  (oscilla)', steps };
  }
 
  // entrambi convergono a finito
  if (clL.type === 'finite' && clR.type === 'finite') {
    // tolleranza relativa leggermente larga per compensare errori di cancellazione numerica
    const tol = 5e-3 * (1 + Math.abs(clL.value) + Math.abs(clR.value));
    if (Math.abs(clL.value - clR.value) < tol) {
      steps.push('I limiti laterali coincidono → limite bilaterale esistente.');
      return { result: fmtNum((clL.value + clR.value) / 2), steps };
    }
    steps.push('I limiti laterali sono diversi → il limite non esiste.');
    return {
      result: `∄  (sin: ${fmtNum(clL.value)}, des: ${fmtNum(clR.value)})`,
      steps
    };
  }
 
  // entrambi ∞
  if (clL.type === 'inf' && clR.type === 'inf') {
    if (clL.sign === clR.sign) {
      steps.push('Entrambi i lati divergono allo stesso ∞.');
      return { result: clL.sign > 0 ? '+∞' : '-∞', steps };
    }
    steps.push('I due lati divergono a ∞ con segni opposti → il limite non esiste.');
    return {
      result: `∄  (sin: ${clL.sign > 0 ? '+' : '-'}∞,  des: ${clR.sign > 0 ? '+' : '-'}∞)`,
      steps
    };
  }
 
  // misto finito / ∞
  if (clL.type === 'finite' && clR.type === 'inf') {
    steps.push('Un lato è finito, l\'altro diverge → il limite non esiste.');
    return { result: `∄  (sin: ${fmtNum(clL.value)},  des: ${clR.sign > 0 ? '+' : '-'}∞)`, steps };
  }
  if (clR.type === 'finite' && clL.type === 'inf') {
    steps.push('Un lato diverge, l\'altro è finito → il limite non esiste.');
    return { result: `∄  (sin: ${clL.sign > 0 ? '+' : '-'}∞,  des: ${fmtNum(clR.value)})`, steps };
  }
 
  return { result: '?', steps: [...steps, 'Convergenza non determinata numericamente.'] };
}
 
// ── 7. COLLEGAMENTO AL BOTTONE ────────────────────────
document.getElementById('calc-btn').addEventListener('click', () => {
  const expr = treeToText(root).trim();
  if (!expr)       { alert('Scrivi prima una funzione!'); return; }
  if (!tendoValue) { alert('Scegli il valore a cui tende x!'); return; }
 
  const resultBox   = document.getElementById('result-box');
  const resultValue = document.getElementById('result-value');
  const resultSteps = document.getElementById('result-steps');
 
  resultBox.classList.add('visible');
  resultValue.textContent = '…';
  resultSteps.textContent = '';
 
  // lascia il browser fare un repaint prima di calcolare
  setTimeout(() => {
    const res = computeLimit(expr, tendoValue);
    if (res.error) {
      resultValue.textContent = '⚠ ' + res.error;
      resultSteps.textContent = '';
    } else {
      resultValue.textContent = '= ' + res.result;
      resultSteps.textContent = res.steps.join('\n');
    }
  }, 20);
});
</script>
